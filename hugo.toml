baseURL = 'https://evqwq.github.io'
languageCode = 'zh-CN'
title = 'EvQwQ 的博客'
theme = 'stack'

[params]
mainSections = ['posts']
featuredImageField = 'image'
rssFullContent = true

[params.footer]
since = 2026

[params.dateFormat]
published = '2006-01-02'
lastUpdated = '2006-01-02 15:04 MST'

[params.sidebar]
emoji = '📝'
subtitle = '分享技术、生活与思考'

[params.sidebar.avatar]
enabled = true
local = false
src = ''

[params.article]
math = false
toc = true
readingTime = true

[params.comments]
enabled = true
provider = 'giscus'

[params.comments.giscus]
repo = 'evqwq/evqwq.github.io'
repoId = ''
category = 'General'
categoryId = ''
mapping = 'pathname'
reactionsEnabled = 1
emitMetadata = 0

[[menu.main]]
identifier = 'home'
name = '首页'
url = '/'
weight = -100

[menu.main.params]
icon = 'home'
newTab = false

[[menu.main]]
identifier = 'archives'
name = '归档'
url = '/archives'
weight = -90

[menu.main.params]
icon = 'archives'

[[menu.main]]
identifier = 'search'
name = '搜索'
url = '/search'
weight = -80

[menu.main.params]
icon = 'search'

[taxonomies]
tag = 'tags'
category = 'categories'

[permalinks]
post = '/p/:slug/'
page = '/:slug/'

[related]
includeNewer = true
threshold = 60
toLower = false

[[related.indices]]
name = 'tags'
weight = 100

[[related.indices]]
name = 'categories'
weight = 200

[markup]

[markup.goldmark]

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = 'github'
lineNos = true
codeFences = true
guessSyntax = true
lineNumbersInTable = true
tabWidth = 4
