{{ define "main" }}
<div class="container">
    <article>
        <h1>{{ .Title }}</h1>
        <div class="meta">
            <time>{{ .Date.Format "2006年1月2日" }}</time>
            {{ if .Params.tags }}
            <div class="tags">
                {{ range .Params.tags }}
                <a href="{{ "/tags/" | relURL }}{{ . | urlize }}" class="tag">{{ . }}</a>
                {{ end }}
            </div>
            {{ end }}
        </div>
        
        <!-- 文章目录 -->
        {{ if .TableOfContents }}
        <div class="toc" style="background: var(--bg-secondary); padding: 1.5rem; border-radius: var(--radius-sm); margin-bottom: 2rem;">
            <h3 style="margin: 0 0 1rem 0; font-size: 1rem;">📑 目录</h3>
            {{ .TableOfContents }}
        </div>
        {{ end }}
        
        {{ .Content }}
        
        <!-- 阅读量统计 -->
        <div class="page-views" style="margin-top: 2rem; padding: 1rem; background: var(--bg-secondary); border-radius: var(--radius-sm); text-align: center;">
            <span id="visit-count">阅读中...</span>
        </div>
    </article>
    
    <!-- Giscus 评论 -->
    <div class="comments" style="margin-top: 3rem;">
        <h2 style="margin-bottom: 1rem;">💬 评论区</h2>
        <script src="https://giscus.app/client.js"
                data-repo="evqwq/evqwq.github.io"
                data-repo-id=""
                data-category="General"
                data-category-id=""
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="top"
                data-theme="preferred_color_scheme"
                data-lang="zh-CN"
                data-loading="lazy"
                crossorigin="anonymous"
                async>
        </script>
        <noscript>启用 JavaScript 后才能查看评论。</noscript>
    </div>
</div>

<!-- 不蒜子访问量统计 -->
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 等待不蒜子加载
    setTimeout(function() {
        const visitCount = document.getElementById('visit-count');
        if (typeof busuanzi !== 'undefined') {
            visitCount.innerHTML = '<span id="busuanzi_counter_page_pv">访问统计加载中...</span>';
            busuanzi && busuanzi.fetch();
        }
    }, 500);
});

// 监听不蒜子完成事件
document.addEventListener('busuanzi:finish', function() {
    const pv = document.getElementById('busuanzi_value_page_pv');
    const visitCount = document.getElementById('visit-count');
    if (pv && pv.textContent) {
        visitCount.innerHTML = '👁️ 本文阅读量：<strong>' + pv.textContent + '</strong> 次';
    }
});
</script>
{{ end }}
