{{ define "main" }}
<div class="container">
    <h1>🔍 搜索文章</h1>
    
    <div class="search-box" style="margin: 2rem 0;">
        <input type="text" id="search-input" placeholder="输入关键词搜索..." 
               style="width: 100%; padding: 1rem; font-size: 1rem; border: 2px solid var(--border-color); 
                      border-radius: var(--radius-sm); background: var(--bg-primary); color: var(--text-primary);">
    </div>
    
    <div id="search-results"></div>
    
    <div id="all-posts">
        <h2>所有文章</h2>
        <div class="post-list">
            {{ range where .Site.RegularPages "Type" "posts" }}
            <article class="post-item" data-title="{{ .Title | lower }}" data-content="{{ .Plain | lower }}">
                <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
                <div class="meta">
                    <time>{{ .Date.Format "2006年1月2日" }}</time>
                    {{ if .Params.tags }}
                    <div class="tags">
                        {{ range first 3 .Params.tags }}
                        <span class="tag">{{ . }}</span>
                        {{ end }}
                    </div>
                    {{ end }}
                </div>
                <p>{{ .Summary }}</p>
            </article>
            {{ end }}
        </div>
    </div>
</div>

<script>
document.getElementById('search-input').addEventListener('input', function(e) {
    const query = e.target.value.toLowerCase().trim();
    const posts = document.querySelectorAll('.post-item');
    const allPostsSection = document.getElementById('all-posts');
    const resultsDiv = document.getElementById('search-results');
    
    if (query === '') {
        allPostsSection.style.display = 'block';
        resultsDiv.innerHTML = '';
        posts.forEach(post => post.style.display = 'block');
        return;
    }
    
    allPostsSection.style.display = 'none';
    let results = [];
    
    posts.forEach(post => {
        const title = post.getAttribute('data-title');
        const content = post.getAttribute('data-content');
        
        if (title.includes(query) || content.includes(query)) {
            results.push(post.cloneNode(true));
        }
    });
    
    if (results.length === 0) {
        resultsDiv.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">没有找到相关文章</p>';
    } else {
        resultsDiv.innerHTML = '<h2>搜索结果 (' + results.length + ')</h2><div class="post-list"></div>';
        const list = resultsDiv.querySelector('.post-list');
        results.forEach(post => list.appendChild(post));
    }
});
</script>
{{ end }}
