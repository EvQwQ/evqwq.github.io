<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>
    <header>
        <nav>
            <a href="{{ "/" | relURL }}" class="logo">{{ .Site.Title }}</a>
            <ul class="nav-links">
                {{ range .Site.Menus.main }}
                <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
                {{ end }}
            </ul>
        </nav>
    </header>
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>关于</h3>
                <p>{{ .Site.Params.description }}</p>
            </div>
            <div class="footer-section">
                <h3>链接</h3>
                <p><a href="{{ "/" | relURL }}">首页</a></p>
                <p><a href="{{ "/posts/" | relURL }}">文章</a></p>
                <p><a href="{{ "/about/" | relURL }}">关于</a></p>
            </div>
            <div class="footer-section">
                <h3>联系方式</h3>
                <p><a href="https://github.com/{{ .Site.Params.github }}" target="_blank">GitHub</a></p>
                <p><a href="mailto:{{ .Site.Params.email }}">邮箱</a></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. Powered by <a href="https://gohugo.io/" target="_blank">Hugo</a>.</p>
        </div>
    </footer>
</body>
</html>
