{{ define "main" }}
<div class="container">
    <h1>{{ .Title }}</h1>
    
    <div class="tag-cloud" style="margin: 2rem 0;">
        {{ range .Site.Taxonomies.tags.ByCount }}
        <a href="{{ .Page.RelPermalink }}" class="tag" style="font-size: {{ add 0.8 (mul 0.2 .Count) }}rem;">
            {{ .Page.Title }} ({{ .Count }})
        </a>
        {{ end }}
    </div>
    
    {{ if .Pages }}
    <h2>文章列表</h2>
    <div class="post-list">
        {{ range .Pages }}
        <article class="post-item">
            <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
            <div class="meta">
                <time>{{ .Date.Format "2006年1月2日" }}</time>
            </div>
            <p>{{ .Summary }}</p>
        </article>
        {{ end }}
    </div>
    {{ end }}
</div>
{{ end }}
